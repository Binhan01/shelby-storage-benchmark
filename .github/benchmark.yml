name: Shelby Benchmark

on:
  push:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install Shelby CLI
        run: npm install -g @shelby-protocol/cli

      - name: Install deps
        run: pip install pandas matplotlib

      - name: Generate files
        run: python benchmark/file_generator.py

      - name: Run benchmark
        run: python benchmark/benchmark.py